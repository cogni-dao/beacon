# Per-node secrets catalog — node-domain (single-node-scope).
#
# Declare the SHAPE of each A2 secret this node's app consumes; NEVER the value.
# `service:` auto-resolves to this node's slug, so each key lands at
# OpenBao `cogni/<env>/<slug>/<KEY>` and fans out ONLY to this node's pod.
#
# The VALUE is written separately — see docs/guides/add-secret.md §3:
#   - self-serve: POST /api/v1/nodes/<id>/secrets  (node-owner, OpenFGA-gated, API key only)
#   - ops:        pnpm secrets:set <env> <slug> <KEY>
#
# This file ships empty. Add entries as your node needs them, e.g.:
#
# secrets:
#   - name: MY_VENDOR_API_KEY
#     tier: A2
#     appliesTo: web
#     shared: false
#     source: human
#     required: true
#     category: "Vendor Name"
#     description: One line describing what consumes this key.
#     steps:
#       - "Create the key in the vendor dashboard."

secrets:
  # App-level X account (growth-loop): the node's own broadcast account.
  - name: X_API_BEARER_TOKEN
    tier: A2
    appliesTo: web
    shared: false
    source: human
    required: false
    category: "X (Twitter)"
    description: >-
      X API v2 bearer token for the social-x adapter (post content + read
      public engagement metrics). Optional — the adapter is env-gated off and
      the growth loop runs against fakes in CI when unset.
    steps:
      - "Create a Project + App in the X developer portal (developer.x.com)."
      - "Copy the App's Bearer Token from Keys and tokens."
  # Per-tenant X linking: each tenant links their OWN X account via OAuth. ONE OAuth
  # app for the whole node (not per-tenant). See docs/guides/connect-x.md.
  # (CONNECTIONS_ENCRYPTION_KEY is substrate-minted — not declared here.)
  - name: X_OAUTH_CLIENT_ID
    tier: A2
    appliesTo: web
    shared: false
    source: human
    required: false
    category: "X (Twitter) Platform Connection"
    description: OAuth 2.0 client ID for tenant X-account linking (see docs/spec/platform-connections.md).
    steps:
      - "Create an app in the X Developer Portal (developer.x.com) with OAuth 2.0 enabled, type 'Web App / Confidential client'."
      - "Set the callback URL to <APP_BASE_URL>/api/v1/connections/x/callback."
      - "Copy the OAuth 2.0 Client ID."
  - name: X_OAUTH_CLIENT_SECRET
    tier: A2
    appliesTo: web
    shared: false
    source: human
    required: false
    category: "X (Twitter) Platform Connection"
    description: OAuth 2.0 client secret for the confidential-client token exchange.
    steps:
      - "Copy the OAuth 2.0 Client Secret from the same X Developer Portal app."
