id: node-goal-alignment
schema_version: "0.3"
blocking: true
workflow_id: goal-evaluations

# Goal-alignment for beacon — Cogni's growth-engine node. beacon runs a compounding
# growth loop (PLAN → IDEATE → PRODUCE → BROADCAST → MEASURE → ATTRIBUTE → LEARN); a
# change should advance that loop while keeping the node sound and tested.
evaluations:
  - well-built-node: This PR contributes to a sound, well-structured TypeScript AI node built on the Cogni template (clean architecture, typed boundaries).
  - test-coverage: This PR improves or maintains test coverage / reliability of the node's features.
  - clear-purpose: This PR advances beacon's growth-loop mission — strengthening a stage of the PLAN→IDEATE→PRODUCE→BROADCAST→MEASURE→ATTRIBUTE→LEARN loop (or the substrate/knowledge that compounds it) — rather than adding unscoped surface area.

success_criteria:
  neutral_on_missing_metrics: true
  any_of:
    - metric: well-built-node
      gte: 0.8
    - metric: test-coverage
      gte: 0.8
    - metric: clear-purpose
      gte: 0.8
